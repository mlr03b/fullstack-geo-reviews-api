<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>ReViews - Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <div>
            <h1>ReViews</h1>
            <span class="subtitle">Tus reseñas de confianza</span>
        </div>
        <div class="header-controls">
            <button id="theme-toggle">🌙</button>
            <span id="user-info" class="small"></span>
            <button id="logout-btn" class="secondary">Logout</button>
        </div>
    </header>

    <main>
        <section class="card" id="map-section">
            <h2>Mapa de Establecimientos</h2>
            <div class="search-bar">
                <input type="text" id="map-search-input" placeholder="Buscar dirección para centrar mapa...">
                <button id="map-search-btn">Buscar</button>
            </div>
            <div id="map"></div>
        </section>

        <section class="card">
            <h2>Nueva Reseña</h2>
            <form id="create-review-form">
                <div class="form-row">
                    <label>Nombre del Establecimiento</label>
                    <input type="text" id="nombre-input" required placeholder="Ej. Hotel Miramar">
                </div>
                <div class="form-row">
                    <label>Dirección Postal</label>
                    <input type="text" id="direccion-input" required placeholder="Ej. Paseo Reding 22, Málaga">
                </div>
                <div class="form-row">
                    <label>Valoración (0-5)</label>
                    <input type="number" id="valoracion-input" min="0" max="5" required value="5">
                </div>
                <div class="form-row">
                    <label>Imágenes (Opcional - Puedes añadir varias veces)</label>
                    <input type="file" id="imagen-input" accept="image/*" multiple>
                    <div id="image-preview" style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;"></div>
                </div>
                <button type="submit">Publicar Reseña</button>
                <p id="create-msg" class="info"></p>
            </form>
        </section>

        <section class="card">
            <h2>Reseñas Publicadas</h2>
            <div id="reviews-container" class="reviews-grid">
                </div>
        </section>

        <section class="card" id="detail-section" hidden>
            <h2>Detalle de la Reseña</h2>
            <div id="detail-content"></div>
            <button onclick="document.getElementById('detail-section').hidden=true" class="secondary">Cerrar</button>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
