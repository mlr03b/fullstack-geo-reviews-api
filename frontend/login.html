<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ReViews</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <div class="header-brand">
            <h1>ReViews</h1>
        </div>
        <button id="theme-toggle">🌙</button>
    </header>

    <main class="login-container">
        <section class="card center-box">
            <h2>Bienvenido a ReViews</h2>
            <p>Inicia sesión para consultar y crear reseñas de establecimientos.</p>
            <button id="login-btn">Iniciar sesión con Google</button>
            <p id="loading-msg" class="info"></p>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
